<!DOCTYPE html>
<html>

<head>
    <title>Spam Classifier</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            width: 50%;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        textarea {
            width: 90%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
        }

        h1 {
            color: #333;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Email Spam Classifier</h1>

        <form method="POST">

            <textarea
                name="message"
                placeholder="Enter your message here..."
                required></textarea>

            <br>

            <button type="submit">
                Predict
            </button>

        </form>

        {% if prediction %}

            <div class="result">
                {{ prediction }}
            </div>

        {% endif %}

    </div>

</body>
</html>
